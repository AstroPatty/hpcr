[facility]
name = "polaris"
runtime = "apptainer"


[[mpi_binds]]
src = "/opt/cray/"
dst = "/opt/cray/"

[[mpi_binds]]
src = "/var/run/palsd"
dst = "/var/run/palsd"

[[mpi_binds]]
src = "/usr/lib64"
dst = "/usr/hostlib64"

[[mpi_envs]]
key = "MPICH_SMP_SINGLE_COPY_MODE"
value = "NONE"

[[mpi_envs]]
key = "APPTAINERENV_LD_LIBRARY_PATH"
value = "$CRAY_LD_LIBRARY_PATH:$LD_LIBRARY_PATH:/opt/cray/pe/lib64:/opt/cray/pals/1.7/lib:/usr/hostlib64"

[[mpi_envs]]
key = "MPICH_SMP_SINGLE_COPY_MODE"
value = "NONE"

